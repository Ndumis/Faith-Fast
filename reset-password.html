<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reset Password - Faith Fast</title>

    <!-- Enhanced PWA Meta Tags -->
    <meta name="theme-color" content="#4a6fa5">
    <meta name="msapplication-TileColor" content="#4a6fa5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Faith Fast">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Icons for all platforms -->
    <link rel="icon" type="image/png" href="assets/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/icon-152x152.png">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Branding (customize js/branding-config.js per deployment) -->
    <script src="js/branding-config.js"></script>
    <script src="js/branding.js"></script>
</head>
<body class="landing-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon large">
                    <i class="fas fa-pray app-logo-icon"></i>
                </div>
                <h1 class="app-name">Faith Fast</h1>
                <p class="app-tagline">Choose a new password for your account</p>
            </div>

            <!-- Reset Password Form -->
            <form id="resetPasswordForm" class="auth-form active">
                <div class="form-group">
                    <div class="password-field">
                        <input type="password" class="form-control" id="newPassword" name="password" placeholder="New Password" required minlength="8">
                        <button type="button" class="toggle-password" data-target="newPassword" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="field-hint">Must be at least 8 characters</small>
                </div>
                <div class="form-group">
                    <div class="password-field">
                        <input type="password" class="form-control" id="confirmNewPassword" name="confirm_password" placeholder="Confirm New Password" required minlength="8">
                        <button type="button" class="toggle-password" data-target="confirmNewPassword" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="resetSubmitBtn">Reset Password</button>
                <div class="auth-switch">
                    <p>Remember your password? <a href="index.html">Login</a></p>
                </div>
            </form>

            <!-- Invalid / expired token state -->
            <div id="invalidTokenState" class="auth-form">
                <div style="text-align:center;">
                    <i class="fas fa-circle-exclamation" style="font-size:2.5rem; color: var(--error); margin-bottom: 1rem; display:block;"></i>
                    <p>This password reset link is invalid or has expired.</p>
                </div>
                <div class="auth-switch">
                    <p><a href="index.html">Back to login</a> to request a new reset link</p>
                </div>
            </div>

            <!-- Success state -->
            <div id="resetSuccessState" class="auth-form">
                <div style="text-align:center;">
                    <i class="fas fa-circle-check" style="font-size:2.5rem; color: var(--success); margin-bottom: 1rem; display:block;"></i>
                    <p>Your password has been reset successfully.</p>
                </div>
                <div class="auth-switch">
                    <p><a href="index.html">Continue to login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/notify.js"></script>
    <script src="js/password-toggle.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
